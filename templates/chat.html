<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>AI Interview Agent</title>

    <style>

        body {
            font-family: Arial;
            background-color: #f5f5f5;
            padding: 30px;
        }

        h1 {
            color: #333;
        }

        #chat-box {
            background: white;
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        .message {
            display: flex;
            margin-bottom: 20px;
        }

        .user-message {
            justify-content: flex-end;
        }

        .ai-message {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 70%;
            padding: 15px;
            border-radius: 15px;
            line-height: 1.5;
        }

        .user-bubble {
            background-color: #007bff;
            color: white;
        }

        .ai-bubble {
            background-color: white;
            border: 1px solid #ccc;
        }

        .meta {
            margin-top: 10px;
            font-size: 13px;
            color: gray;
        }

        #input-area {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

    </style>

</head>

<body>

    <h1>AI Interview Agent</h1>

    <div id="chat-box"></div>

    <div id="input-area">
        <input
            type="text"
            id="user-input"
            placeholder="請輸入你的回答..."
        >

        <button onclick="sendMessage()">
            傳送
        </button>
    </div>

    <script>

        const sessionId = "user1"

        document
            .getElementById("user-input")
            .addEventListener("keydown", function(event) {

                if (event.key === "Enter") {
                    sendMessage()
                }

            })

        async function sendMessage() {

            try {

                const input = document.getElementById("user-input")

                const message = input.value

                if (!message) return

                addMessage("你", message, "user")

                input.value = ""

                const thinkingId = "thinking-" + Date.now()

                addMessage(
                    "AI 面試官",
                    "思考中...",
                    "ai",
                    "",
                    thinkingId
                )

                const response = await fetch("/interview", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        answer: message,
                        session_id: sessionId
                    })
                })

                if (!response.ok) {
                    throw new Error("API Error")
                }

                const data = await response.json()

                document.getElementById(thinkingId)?.remove()

                if (!data.success) {

                    addMessage(
                        "系統",
                        data.error || "Unknown Error",
                        "ai"
                    )

                    return
                }


                if (data.data.finished)  {

                    addMessage(
                        "最終面試報告",
                        data.data.report,
                        "ai",
                        `Final Average Score: ${data.data.average_score}`
                    )

                } else {

                    const min =
                        Math.floor(data.data.remaining_time / 60)

                    const sec =
                        data.data.remaining_time % 60
                    
                    const metaText = `
                    Decision: ${data.data.decision}<br>
                    Difficulty: ${data.data.difficulty}<br>
                    Topic: ${data.data.current_topic}<br>
                    Main Question: ${data.data.main_question_count}<br>
                    Follow Up: ${data.data.followup_count}<br>
                    Messages: ${data.data.message_count}<br>
                    Remaining Time: ${min}:${sec.toString().padStart(2, '0')}<br>
                    Score: ${data.data.score}<br>
                    Average Score: ${data.data.average_score}<br>
                    Feedback: ${data.data.feedback}
                    `

                    addMessage(
                        "AI 面試官",
                        data.data.ai_response,
                        "ai",
                        metaText
                    )
                }

            } catch (error) {

                console.error(error)

                addMessage(
                    "系統",
                    "發生錯誤，請查看後端 terminal",
                    "ai"
                )
            }
        }


        function addMessage(sender, text, type, meta="", elementId=null) {

            const chatBox =
                document.getElementById("chat-box")

            const wrapper =
                document.createElement("div")

            wrapper.className =
                type === "user"
                ? "message user-message"
                : "message ai-message"

            if (elementId) {
                wrapper.id = elementId
            }

            const bubble =
                document.createElement("div")

            bubble.className =
                type === "user"
                ? "bubble user-bubble"
                : "bubble ai-bubble"

            bubble.innerHTML = `
            <strong>${sender}</strong><br>
            ${text}

            <div style="margin-top:10px;color:gray;">
                ${meta}
            </div>
            `

            wrapper.appendChild(bubble)

            chatBox.appendChild(wrapper)

            chatBox.scrollTop =
                chatBox.scrollHeight
        }

    </script>

</body>
</html>
